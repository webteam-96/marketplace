<script>
$.noConflict();
jQuery(window).load(function(){

var url = window.location.href;
var pgName = url.split('/')[3];


 


jQuery('.main-nav').find('.nav-link').each(function(){
  var href = jQuery(this).attr('href');
  if(href == pgName){
    jQuery('.main-nav').find('.nav-link').removeClass('active')
    jQuery(this).addClass('active')
  };

});


});

jQuery(document).ready(function($){

  
 

  jQuery('#toggleMenu').click(function() {
  if (jQuery(this).is(':checked')) {
       jQuery('body').addClass('openMenu'); 
      jQuery('.navbar-toggler ').addClass('fa-times');
      jQuery('.navbar-toggler ').removeClass('fa-bars');
  } else {
     jQuery('body').removeClass('openMenu'); 
      jQuery('.navbar-toggler ').removeClass('fa-times');
      jQuery('.navbar-toggler ').addClass('fa-bars');
  }
});
